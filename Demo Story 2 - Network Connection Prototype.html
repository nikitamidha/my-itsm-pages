<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TechGuard · ITForce — Story 2: Network Connectivity (NET-2208)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#15171C; --ink2:#2B333D; --slate600:#586471; --slate500:#8B919E; --slate400:#9AA0AB;
  --border:#EAECF0; --hairline:#F2F3F6; --canvas:#F6F7F9; --white:#fff;
  --indigo600:#5B57E6; --indigo700:#4B46D0; --indigo500:#6C69E0; --indigo300:#C4C2F3; --indigo50:#EEEEF9; --indigo25:#F4F4FC;
  --crit:#E5484D; --crit-bg:#FDECEB; --crit-fg:#b3373b;
  --warn:#BD7D12; --warn-bg:#F8F0DF; --warn-fg:#876028;
  --heal:#18935F; --heal-bg:#E6F2EC;
  --agent:#3B82C4; --agent-bg:#E8F1F9; --agent-fg:#2c6592;
  --human:#5B57E6; --human-bg:#EEEEF9; --human-fg:#4b46d0;
  --close-bg:#f1eaf4; --close-fg:#774a82; --close-dot:#9a5fa6;
  --watch-bg:#eef1f4; --watch-fg:#586471; --watch-dot:#7c8794;
  --r-pill:7px; --r-ctrl:11px; --r-card:14px; --r-panel:18px;
  --shadow-raise:0 6px 18px rgba(20,23,30,.06);
  --shadow-float:0 8px 28px rgba(20,23,30,.18);
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{
  font-family:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  color:var(--ink); background:#0f1014; font-variant-numeric:tabular-nums;
  -webkit-font-smoothing:antialiased; overflow:hidden;
}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:#e2e4e9;border-radius:8px;border:3px solid transparent;background-clip:content-box;}
button{font-family:inherit;cursor:pointer;}

/* ===== Stage ===== */
#stage{position:fixed;inset:0;bottom:84px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#0f1014;}
.frame-desktop{width:100%;height:100%;max-width:1180px;max-height:760px;background:var(--canvas);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-float);}
.frame-mobile{width:392px;height:740px;max-height:100%;background:var(--canvas);border-radius:30px;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-float);border:6px solid #1b1d23;position:relative;}

/* top browser-ish bar */
.topbar{height:38px;flex-shrink:0;background:#fff;border-bottom:1px solid var(--hairline);display:flex;align-items:center;gap:8px;padding:0 14px;font-size:12px;color:var(--slate500);}
.topbar .dot{width:10px;height:10px;border-radius:50%;}
.topbar .url{flex:1;text-align:center;font-size:11px;color:var(--slate400);background:var(--canvas);border-radius:7px;padding:4px 0;max-width:420px;margin:0 auto;}

/* ===== Desktop three-pane ===== */
.app{flex:1;display:flex;min-height:0;}
.rail{width:226px;flex-shrink:0;background:#fff;border-right:1px solid #eef0f3;display:flex;flex-direction:column;}
.rail-top{padding:16px 16px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--hairline);}
.logo{width:30px;height:30px;border-radius:8px;background:var(--indigo600);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;letter-spacing:-.3px;}
.rail nav{flex:1;overflow-y:auto;padding:12px 10px;}
.navgrp{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#aab0bb;margin:13px 4px 5px 11px;}
.navitem{padding:7px 11px;margin-bottom:1px;border-radius:9px;font-size:12.5px;font-weight:500;color:#3d424d;cursor:pointer;display:flex;align-items:center;gap:9px;}
.navitem:hover{background:var(--indigo25);color:var(--indigo700);}
.navitem.active{background:var(--indigo50);color:var(--indigo700);font-weight:600;}
.navitem .ct{margin-left:auto;font-size:11px;font-weight:600;color:var(--slate400);}
.navitem .ct.alert{background:var(--crit);color:#fff;border-radius:20px;padding:1px 6px;font-size:10px;}
.rail-user{padding:11px 14px;border-top:1px solid var(--hairline);display:flex;align-items:center;gap:9px;}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}

.center{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--canvas);}
.center-scroll{flex:1;overflow-y:auto;padding:26px 30px 40px;}
.copilot{width:300px;flex-shrink:0;background:#fff;border-left:1px solid #eef0f3;display:flex;flex-direction:column;}

/* headers */
.eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--slate400);}
h1.page{font-size:27px;font-weight:700;letter-spacing:-.7px;margin:2px 0 3px;}
.sub{font-size:13px;color:var(--slate500);}

/* badges & pills */
.pri{font-size:10.5px;font-weight:700;color:#fff;padding:2px 8px;border-radius:var(--r-pill);letter-spacing:.2px;}
.pri.p1{background:var(--crit);} .pri.p2{background:var(--warn);} .pri.p3{background:#8b909c;}
.mode{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:8px;}
.mode .d{width:6px;height:6px;border-radius:50%;}
.mode.inputs{background:#FAECE7;color:#993C1D;} .mode.inputs .d{background:#B4502A;}
.mode.approvals{background:#FAEEDA;color:#854F0B;} .mode.approvals .d{background:#BD7D12;}
.mode.verify{background:#EAF3DE;color:#3B6D11;} .mode.verify .d{background:#5C8F1E;}
.mode.watch{background:#E6F1FB;color:#185FA5;} .mode.watch .d{background:#3B82C4;}
.mode.assist{background:#E8F2EF;color:#416F67;} .mode.assist .d{background:#5C9387;}
.mode.cluster{background:#FAEEDA;color:#854F0B;} .mode.cluster .d{background:#BD7D12;}
.mode.calibrate{background:#EEEDF8;color:#534AB7;} .mode.calibrate .d{background:#534AB7;}

/* inline right pane (three-pane reflow) */
.rpane{width:452px;flex-shrink:0;background:#fff;border-left:1px solid #eef0f3;display:flex;flex-direction:column;}
.rpane.full{width:100%;border-left:none;}
.pane-head{padding:15px 20px 13px;border-bottom:1px solid var(--hairline);}
.pane-body{flex:1;overflow-y:auto;padding:16px 20px;}
.pane-foot{padding:13px 20px;border-top:1px solid var(--hairline);display:flex;gap:10px;align-items:center;}
.icbtn{width:30px;height:30px;border-radius:9px;border:1px solid var(--border);background:#fff;color:var(--slate600);font-size:13px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;}
.icbtn:hover{border-color:var(--indigo300);color:var(--indigo700);}

/* agent trace timeline */
.trace{position:relative;margin:4px 0 8px;}
.tnode{position:relative;padding:0 0 18px 30px;}
.tnode:before{content:'';position:absolute;left:9px;top:20px;bottom:-2px;width:2px;background:var(--border);}
.tnode:last-child:before{display:none;}
.tdot{position:absolute;left:0;top:1px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;}
.tdot.done{background:var(--heal);} .tdot.active{background:var(--agent);box-shadow:0 0 0 4px var(--agent-bg);}
.tnode .tname{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;}
.tnode .ttime{font-size:10.5px;color:var(--slate400);font-weight:600;}
.tnode .tfind{font-size:12px;color:var(--ink2);line-height:1.5;margin:6px 0;}
.tnode .thand{font-size:11.5px;color:var(--slate600);background:var(--canvas);border:1px solid var(--hairline);border-radius:9px;padding:7px 10px;margin-top:6px;display:flex;gap:7px;align-items:flex-start;}
.insight{background:#FAECE7;border:1px solid #f0d5c8;border-radius:10px;padding:9px 11px;margin-top:7px;font-size:11.5px;color:#993C1D;line-height:1.45;}
.insight b{color:#7a2e16;}

/* notification center */
.notif-wrap{position:relative;}
.notif-btn{position:relative;width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;}
.notif-btn .cnt{position:absolute;top:-5px;right:-5px;background:var(--crit);color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:1px 5px;}
.notif-panel{position:absolute;top:44px;right:0;width:320px;background:#fff;border:1px solid var(--border);border-radius:var(--r-card);box-shadow:var(--shadow-float);z-index:40;overflow:hidden;}
.notif-item{padding:11px 14px;border-bottom:1px solid var(--hairline);display:flex;gap:10px;align-items:flex-start;}
.notif-item .nd{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.newpill{font-size:9.5px;font-weight:700;color:#fff;background:#7a6fb0;border-radius:6px;padding:1px 6px;letter-spacing:.3px;}
.livedot{width:7px;height:7px;border-radius:50%;background:var(--agent);display:inline-block;box-shadow:0 0 0 0 rgba(59,130,196,.5);animation:pulse 1.8s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(59,130,196,.45)}70%{box-shadow:0 0 0 7px rgba(59,130,196,0)}100%{box-shadow:0 0 0 0 rgba(59,130,196,0)}}

/* clickable affordance */
.clk{cursor:pointer;transition:box-shadow .12s,border-color .12s;}
.clk:hover{box-shadow:0 4px 14px rgba(91,87,230,.10);border-color:var(--indigo300);}
.navitem{cursor:pointer;}

/* diagnostics animation */
.progwrap{height:8px;border-radius:5px;background:var(--hairline);overflow:hidden;margin:2px 0 16px;}
.progwrap i{display:block;height:100%;background:var(--agent);width:0;transition:width .45s ease;}
.diag-step{display:flex;align-items:center;gap:11px;padding:11px 13px;border:1px solid var(--border);border-radius:12px;margin-bottom:9px;background:#fff;opacity:.4;transition:opacity .3s;}
.diag-step.active{opacity:1;}
.diag-step .sp{width:22px;height:22px;border-radius:50%;border:2.5px solid var(--hairline);border-top-color:var(--agent);animation:spin .7s linear infinite;flex-shrink:0;}
.diag-step.ok .sp{border:none;background:var(--heal);animation:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;}
@keyframes spin{to{transform:rotate(360deg)}}

/* 4-up final */
.quad{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.mini{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;}
.mini-head{padding:10px 13px;border-bottom:1px solid var(--hairline);display:flex;align-items:center;gap:9px;}
.mini-body{padding:12px 13px;flex:1;}
.mini-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--slate600);padding:5px 0;}
.chip{font-size:11px;font-weight:600;color:var(--slate600);background:#f1f3f6;padding:2px 9px;border-radius:6px;}
.attn{font-size:11px;font-weight:600;padding:3px 9px;border-radius:7px;}
.attn.appr{background:var(--agent-bg);color:var(--agent-fg);}
.attn.sla{background:var(--warn-bg);color:var(--warn-fg);}
.attn.cust{background:var(--crit-bg);color:var(--crit-fg);}
.attn.agent{background:var(--indigo50);color:var(--indigo700);}
.attn.dispatch{background:#eef1f4;color:var(--slate600);}
.tag{font-size:11px;font-weight:500;color:var(--slate600);background:var(--canvas);border:1px solid #eef0f3;padding:3px 9px;border-radius:7px;}

/* buttons */
.btn{border-radius:var(--r-ctrl);padding:11px 17px;font-size:13px;font-weight:600;border:1px solid transparent;}
.btn-dark{background:#1b1d23;color:#fff;} .btn-dark:hover{background:#2b2e36;}
.btn-indigo{background:var(--indigo600);color:#fff;} .btn-indigo:hover{background:var(--indigo700);}
.btn-out{background:#fff;color:#1b1d23;border-color:#dcdee5;} .btn-out:hover{border-color:var(--indigo300);}
.btn-ghost{background:#fff;color:var(--slate500);border-color:#dcdee5;}
.btn-copilot{background:var(--indigo50);color:var(--indigo700);border-color:#e3e2f6;}

/* cards */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r-card);}
.metric{background:#fff;border:1px solid var(--border);border-radius:var(--r-card);padding:15px 16px;}
.metric .lab{font-size:12px;font-weight:500;color:var(--slate500);}
.metric .val{font-size:28px;font-weight:700;letter-spacing:-.6px;line-height:1;}
.metric .sub{font-size:11px;color:var(--slate400);margin-top:7px;}

/* queue row */
.qrow{background:#fff;border:1px solid var(--border);border-radius:var(--r-card);padding:13px 16px;border-left:3px solid var(--indigo500);cursor:pointer;transition:box-shadow .12s,border-color .12s;}
.qrow:hover{box-shadow:0 4px 14px rgba(91,87,230,.10);border-color:var(--indigo300);border-left-color:var(--indigo500);}
.qrow.sel{box-shadow:0 4px 14px rgba(91,87,230,.14);border-color:var(--indigo300);background:#fdfdff;}
.qrow .ttl{font-size:14px;font-weight:600;margin:7px 0;}
.qmeta{display:flex;align-items:center;gap:6px 15px;flex-wrap:wrap;font-size:11.5px;color:#6c7280;}
.qmeta2{display:flex;align-items:center;gap:6px 15px;flex-wrap:wrap;font-size:11px;color:var(--slate400);margin-top:5px;}

/* copilot */
.cp-head{padding:15px 18px 12px;border-bottom:1px solid var(--hairline);}
.cp-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:11px;}
.cp-q{align-self:flex-end;max-width:84%;background:#1b1d23;color:#fff;border-radius:14px 14px 4px 14px;padding:9px 12px;font-size:12.5px;line-height:1.5;}
.cp-a{align-self:flex-start;max-width:92%;background:#f5f6f8;color:var(--ink2);border:1px solid #eceef2;border-radius:14px 14px 14px 4px;padding:9px 12px;font-size:12.5px;line-height:1.55;}
.cp-src{font-size:10px;color:#aab0bb;margin-top:-5px;}
.cp-foot{padding:12px;border-top:1px solid var(--hairline);}
.cp-input{width:100%;border:1px solid var(--border);border-radius:var(--r-ctrl);padding:10px 12px;font-size:12.5px;color:var(--slate500);background:var(--canvas);}

/* right detail drawer (slides over copilot region) */
.drawer{position:absolute;top:0;right:0;bottom:0;width:430px;background:#fff;border-left:1px solid var(--border);box-shadow:var(--shadow-float);display:flex;flex-direction:column;z-index:30;}
.drawer-head{padding:16px 20px 14px;border-bottom:1px solid var(--hairline);}
.drawer-body{flex:1;overflow-y:auto;padding:18px 20px;}
.drawer-foot{padding:14px 20px;border-top:1px solid var(--hairline);display:flex;gap:10px;}
.kv{display:flex;justify-content:space-between;gap:14px;padding:8px 0;border-bottom:1px solid var(--hairline);font-size:12.5px;}
.kv .k{color:var(--slate500);} .kv .v{font-weight:600;color:var(--ink2);text-align:right;}

/* evidence bars */
.cause{display:flex;align-items:center;gap:10px;padding:9px 0;}
.cause .nm{font-size:12.5px;color:var(--ink2);flex:1;}
.cause .bar{height:6px;border-radius:4px;background:var(--hairline);width:120px;overflow:hidden;}
.cause .bar i{display:block;height:100%;border-radius:4px;}
.cause .pct{font-size:12px;font-weight:700;width:34px;text-align:right;}

/* mobile */
.m-scroll{flex:1;overflow-y:auto;}
.m-pad{padding:16px 16px 90px;}
.m-tabbar{position:absolute;left:0;right:0;bottom:0;height:60px;background:#fff;border-top:1px solid var(--hairline);display:flex;}
.m-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;color:var(--slate400);}
.m-tab.on{color:var(--indigo600);}
.m-actionbar{position:absolute;left:0;right:0;bottom:0;padding:14px 16px;background:#fff;border-top:1px solid var(--hairline);box-shadow:0 -4px 16px rgba(0,0,0,.05);}
.seg{display:flex;background:var(--canvas);border:1px solid var(--border);border-radius:10px;padding:3px;gap:2px;}
.seg button{flex:1;border:none;background:transparent;border-radius:8px;padding:7px 0;font-size:12px;font-weight:600;color:var(--slate500);}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.06);}
.rb{display:flex;align-items:center;gap:11px;padding:12px 13px;border:1px solid var(--border);border-radius:12px;margin-bottom:9px;background:#fff;}
.rb .ck{width:22px;height:22px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
.rb .ck.done{background:var(--heal);color:#fff;} .rb .ck.todo{background:var(--canvas);border:1.5px solid var(--border);color:var(--slate400);}

/* portal (Elena) */
.portal-head{background:#fff;border-bottom:1px solid var(--hairline);padding:14px 30px;display:flex;align-items:center;gap:14px;}
.svc-card{background:#fff;border:1px solid var(--border);border-radius:var(--r-card);padding:14px 16px;border-top:3px solid var(--heal);}
.bubble-them{background:#f3f4f6;color:var(--ink2);border-radius:14px 14px 14px 4px;padding:10px 13px;font-size:13px;line-height:1.5;max-width:80%;}
.bubble-me{background:#1b1d23;color:#fff;border-radius:14px 14px 4px 14px;padding:10px 13px;font-size:13px;line-height:1.5;max-width:80%;align-self:flex-end;}

/* ===== Presenter bar ===== */
#presenter{position:fixed;left:0;right:0;bottom:0;height:84px;background:#15171c;color:#fff;display:flex;align-items:center;gap:18px;padding:0 22px;z-index:100;}
#presenter .badge2{display:flex;align-items:center;gap:8px;flex-shrink:0;}
#presenter .demo-pill{font-size:10px;font-weight:700;letter-spacing:.5px;background:#2b2e36;color:#cfd1d8;padding:4px 9px;border-radius:7px;}
#presenter .persona{display:flex;align-items:center;gap:9px;flex-shrink:0;padding-right:18px;border-right:1px solid #2b2e36;}
#presenter .persona .nm{font-size:12px;font-weight:600;}
#presenter .persona .rl{font-size:10.5px;color:#9aa0ab;}
#presenter .cap{flex:1;min-width:0;}
#presenter .cap .t{font-size:13.5px;font-weight:700;letter-spacing:-.2px;}
#presenter .cap .b{font-size:11.5px;color:#aab0bb;line-height:1.4;margin-top:2px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
#presenter .nav2{display:flex;align-items:center;gap:10px;flex-shrink:0;}
#presenter .count{font-size:11px;color:#9aa0ab;font-variant-numeric:tabular-nums;min-width:42px;text-align:center;}
#presenter .pbtn{width:38px;height:38px;border-radius:10px;border:1px solid #2b2e36;background:#1f2229;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;}
#presenter .pbtn:hover{background:#2b2e36;}
#presenter .pnext{width:auto;padding:0 18px;gap:7px;background:var(--indigo600);border-color:var(--indigo600);font-size:13px;font-weight:600;}
#presenter .pnext:hover{background:var(--indigo700);}
#progress{position:fixed;left:0;right:0;bottom:84px;height:3px;background:#2b2e36;z-index:101;}
#progress i{display:block;height:100%;background:var(--indigo500);transition:width .25s;}
.mut{color:var(--slate500);} .b6{font-weight:600;} .b7{font-weight:700;}
</style>
</head>
<body>
<div id="stage"></div>
<div id="progress"><i></i></div>
<div id="presenter">
  <div class="persona" id="p-persona"></div>
  <div class="cap"><div class="t" id="p-title"></div><div class="b" id="p-body"></div></div>
  <div class="nav2">
    <span class="demo-pill">DEMO · STORY 2</span>
    <button class="pbtn" id="p-back">‹</button>
    <span class="count" id="p-count"></span>
    <button class="pbtn pnext" id="p-next">Next ›</button>
  </div>
</div>
<script>
/* ============ shared component helpers ============ */
const A = {
  elena:{n:'Elena Park',r:'Office Manager · Northstar Dental',av:'EP',c:'#0f7b6c'},
  sarah:{n:'Sarah Rose',r:'CSA · Day shift',av:'SR',c:'#5b57e6'},
  ray:{n:'Ray Oak',r:'Field Service · Plano area',av:'RO',c:'#b06f2e'},
  marcus:{n:'Marcus Chen',r:'IT Operations',av:'MC',c:'#2b2e36'},
};
const av = (p,size=30)=>`<div class="avatar" style="background:${p.c};width:${size}px;height:${size}px;font-size:${size*0.37}px">${p.av}</div>`;
const pri = p=>`<span class="pri ${p.toLowerCase()}">${p}</span>`;
const MODES={inputs:'Inputs Required',approvals:'Approvals',verify:'Verify & Close',watch:'Watch',assist:'Assist',cluster:'Cluster',calibrate:'Calibrate'};
const mode = (m)=>`<span class="mode ${m}"><span class="d"></span>${MODES[m]||m}</span>`;
const chip = t=>`<span class="chip">${t}</span>`;
const tag = t=>`<span class="tag">${t}</span>`;

/* ============ frame shells ============ */
function topbar(color, label, url){
  return `<div class="topbar">
    <span class="dot" style="background:#ff5f57"></span><span class="dot" style="background:#febc2e"></span><span class="dot" style="background:#28c840"></span>
    <span class="url">${url}</span>
    <span style="font-size:11px;color:var(--slate400)">${label}</span></div>`;
}
function deskFrame({url,label,rail,center,copilot,drawer}){
  return `<div class="frame-desktop">${topbar('#5b57e6',label,url)}
    <div class="app" style="position:relative">
      ${rail}
      <div class="center">${center}</div>
      ${copilot||''}
      ${drawer||''}
    </div></div>`;
}
function mobFrame(inner){ return `<div class="frame-mobile">${inner}</div>`; }

let i = 0;
let expanded = false;
let rayTab = null;
let diagState = null;     // null | 'running' | 'done'
let diagAnimating = false;
let viewOverride = null;  // exploratory screen, cleared on Next/Back
function paint(){
  const s = viewOverride || STORY[i];
  document.getElementById('stage').innerHTML = s.render();
  const p = A[s.p];
  document.getElementById('p-persona').innerHTML = `${av(p,30)}<div><div class="nm">${p.n}</div><div class="rl">${p.r}</div></div>`;
  document.getElementById('p-title').textContent = s.t;
  document.getElementById('p-body').textContent = s.b;
  document.getElementById('p-count').textContent = String(i+1).padStart(2,'0')+' / '+STORY.length;
  document.querySelector('#progress i').style.width = ((i+1)/STORY.length*100)+'%';
  document.getElementById('p-back').style.opacity = i===0?.4:1;
  document.getElementById('p-next').innerHTML = i===STORY.length-1 ? 'Restart ↻' : 'Next ›';
  // clicking a queue row / card jumps to its detail step
  document.querySelectorAll('[data-row]').forEach(el=>el.addEventListener('click',()=>{
    const r=el.dataset.row;
    if(r==='back-day'){ i=4; rayTab=null; diagState=null; viewOverride=null; paint(); return; }
    if(r==='NET-2208'){
      viewOverride=null; expanded=false; rayTab=null; diagState=null;
      if(s.p==='marcus'){ i=8; } else if(s.p==='ray'){ i=5; } else { i=3; }
      paint();
    }
  }));
  // detail-pane + tab + flow controls
  document.querySelectorAll('[data-action]').forEach(el=>el.addEventListener('click',()=>{
    const a=el.dataset.action;
    if(a==='expand'){ expanded=true; paint(); }
    else if(a==='collapse'){ expanded=false; paint(); }
    else if(a==='takeover'){ i=4; expanded=false; rayTab=null; diagState=null; viewOverride=null; paint(); }
    else if(a==='approve'){ i=9; paint(); }                       // execute → done (keeps expand state)
    else if(a==='goto-onsite'){ i=6; rayTab=null; diagState=null; paint(); }   // Accept dispatch
    else if(a==='rundiag'){ diagState='running'; diagAnimating=false; paint(); }
    else if(a==='to-itops'){ i=7; rayTab=null; diagState=null; viewOverride=null; paint(); }
    else if(a==='finish'){ i=STORY.length-1; rayTab=null; diagState=null; expanded=false; viewOverride=null; paint(); }
  }));
  // Ray mobile tab switching (stays on same story step)
  document.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click',()=>{ rayTab=el.dataset.tab; diagState=null; paint(); }));
  // sidebar + nav targets
  document.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>navTo(el.dataset.nav)));
  // animate diagnostics when running
  if(diagState==='running' && !diagAnimating) startDiag();
}
function navTo(key){
  const steps={'go:elena':0,'go:sarah-dash':1,'go:sarah-watch':2,'go:sarah-ticket':3,'go:ray-day':4,'go:marcus-dash':7,'go:marcus-approval':8};
  expanded=false; rayTab=null; diagState=null;
  if(key in steps){ viewOverride=null; i=steps[key]; paint(); return; }
  if(EXPLORE[key]){ viewOverride=EXPLORE[key]; paint(); return; }
}
function startDiag(){
  diagAnimating=true;
  const steps=[...document.querySelectorAll('.diag-step')];
  const prog=document.querySelector('.progwrap i');
  let k=0;
  (function tick(){
    if(k>=steps.length){ setTimeout(()=>{ diagState='done'; diagAnimating=false; paint(); }, 450); return; }
    const st=steps[k]; st.classList.add('active');
    setTimeout(()=>{ st.classList.add('ok'); const sp=st.querySelector('.sp'); if(sp) sp.textContent='✓'; if(prog) prog.style.width=Math.round((k+1)/steps.length*100)+'%'; k++; tick(); }, 560);
  })();
}
function go(d){ i = (i+d+STORY.length)%STORY.length; expanded=false; rayTab=null; diagState=null; viewOverride=null; paint(); }
document.getElementById('p-next').addEventListener('click',()=>{ i===STORY.length-1 ? (i=0,paint()) : go(1); });
document.getElementById('p-back').addEventListener('click',()=>go(-1));
document.addEventListener('keydown',e=>{ if(e.key==='ArrowRight')go(1); if(e.key==='ArrowLeft')go(-1); });
paint();
</script>
